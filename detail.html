<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <title>Detail Paket</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="detail.css" />
  </head>
<body>

<header class="topbar">
  <div class="brand">PANGANDARAN.IN</div>

  <nav class="nav-pill">
    <a href="index.html">Home</a>
    <a href="index.html#destinasi-scroll">Destinasi</a>
    <a href="index.html#paket-scroll">Paket</a>
    <a href="index.html#gallery">Galeri</a>
    <a href="about.html">About</a>
  </nav>

  <a class="contact-btn" href="booking.html">
    Booking Now
    <span class="arrow">↗</span>
  </a>
</header>

<div class="detail-page">
  <div class="detail-wrapper">

    <div class="top-layout">
      <!-- GALLERY (3 FOTO) -->
      <div class="detail-gallery">
        <div class="gallery-main" id="galleryMain">
          <button class="nav-arrow left" id="prevBtn" aria-label="Sebelumnya">‹</button>

          <div class="slides" id="slides">
            <!-- diisi JS -->
          </div>

          <button class="nav-arrow right" id="nextBtn" aria-label="Berikutnya">›</button>
        </div>
      </div>

      <!-- KONTEN -->
      <div class="detail-content">
        <div class="meta-kecil" id="subtitlePaket">River Adventure • 1 Day</div>
        <h1 id="namaPaket">Nama Paket</h1>

        <p class="detail-desc" id="descPaket">
          Deskripsi paket...
        </p>

        <!-- Highlights (ringkas) -->
        <div class="mini-list">
          <div class="mini-title">Highlight</div>
          <ul id="highlightsList"></ul>
        </div>

        <!-- Include -->
        <div class="extra">
          <div>
            <h3>Include</h3>
            <div id="inclusionsList"></div>
          </div>
        </div>
      </div>

      <!-- BOOKING -->
      <div class="detail-right">
        <div class="booking-box">
          <div class="price-row">
            <div>
              <div class="mulai-dari">Mulai dari</div>
              <h2 id="hargaPaket">Rp 0</h2>
            </div>
            <div class="unit" id="unitPaket">/ orang</div>
          </div>

          <label>Nama</label>
          <input id="nama" type="text" placeholder="Masukan Nama" />

          <label>Tanggal</label>
          <input id="tanggal" type="date" />

          <label>Jumlah Peserta</label>
          <input id="peserta" type="number" min="1" value="1" />

          <div class="total">
            Total: Rp <span id="totalHarga">0</span>
          </div>

          <button id="bookWA" class="book-btn">Booking Sekarang</button>

          <div class="note">
            Admin akan membalas untuk konfirmasi jadwal dan detail pembayaran via WhatsApp.
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- =============================== SCRIPT =============================== -->
<!-- ====================================================================== -->
<script>
  // Ambil key dari URL: detail.html?paket=gc
  const params = new URLSearchParams(window.location.search);
  const key = params.get("paket") || "gc";

  // Ambil template
  const tpl = document.getElementById("paket-" + key) || document.getElementById("paket-gc");
  const frag = tpl.content.cloneNode(true);

  const data = frag.querySelector("data");
  const images = [...frag.querySelectorAll("images img")].slice(0, 3);
  const highlights = [...frag.querySelectorAll("highlights li")];
  const groups = [...frag.querySelectorAll("inclusions group")];

  // Helper
  const formatRupiah = (n) => "Rp " + (Number(n) || 0).toLocaleString("id-ID");

  const title = data?.getAttribute("title") || "Paket";
  const subtitle = data?.getAttribute("subtitle") || "";
  const desc = data?.getAttribute("desc") || "";
  const price = Number(data?.getAttribute("price") || 0);
  const unit = data?.getAttribute("unit") || "/ orang";
  const wa = data?.getAttribute("wa") || "6280000000000";

  // Set konten utama
  document.getElementById("namaPaket").innerText = title;
  document.getElementById("subtitlePaket").innerText = subtitle;
  document.getElementById("descPaket").innerText = desc;

  document.getElementById("hargaPaket").innerText = formatRupiah(price);
  document.getElementById("unitPaket").innerText = unit;

  // Highlights list
  const hlEl = document.getElementById("highlightsList");
  hlEl.innerHTML = "";
  highlights.forEach(li => {
    const item = document.createElement("li");
    item.textContent = li.textContent.trim();
    hlEl.appendChild(item);
  });

  // Inclusions groups
  const incEl = document.getElementById("inclusionsList");
  incEl.innerHTML = "";
  groups.forEach(g => {
    const label = g.getAttribute("label") || "Include";
    const items = [...g.querySelectorAll("li")].map(x => x.textContent.trim()).filter(Boolean);

    const box = document.createElement("div");
    box.className = "inc-group";
    box.innerHTML = `
      <h4>${label}</h4>
      <ul>${items.map(t => `<li>${t}</li>`).join("")}</ul>
    `;
    incEl.appendChild(box);
  });

  // Gallery (3 foto) - GRID
const slidesEl = document.getElementById("slides");
slidesEl.innerHTML = "";

const gallery = images.length ? images : [];

gallery.forEach((img, idx) => {
  const slide = document.createElement("div");
  slide.className = "slide";
  slide.innerHTML = `<img src="${img.getAttribute("src")}" alt="foto ${idx+1}">`;
  slidesEl.appendChild(slide);
});

// tombol panah tetap ada tapi tidak melakukan apa-apa
document.getElementById("prevBtn").addEventListener("click", () => {});
document.getElementById("nextBtn").addEventListener("click", () => {});
  // Total harga
  const pesertaInput = document.getElementById("peserta");
  const totalHargaEl = document.getElementById("totalHarga");

  function hitungTotal() {
    const peserta = Math.max(1, parseInt(pesertaInput.value) || 1);
    pesertaInput.value = peserta;
    totalHargaEl.innerText = (peserta * price).toLocaleString("id-ID");
  }
  pesertaInput.addEventListener("input", hitungTotal);
  hitungTotal();

  // WhatsApp
  document.getElementById("bookWA").addEventListener("click", () => {
    const nama = document.getElementById("nama").value.trim();
    const tanggal = document.getElementById("tanggal").value;
    const peserta = parseInt(document.getElementById("peserta").value) || 1;
    const total = totalHargaEl.innerText;

    if (!nama || !tanggal || peserta <= 0) {
      alert("Lengkapi data anda");
      return;
    }

    const pesan =
`Halo kak, saya tertarik dengan paket trip barengpangandaran.in

Detail Pemesanan: ${title}
Nama    : ${nama}
Tanggal : ${tanggal}
Peserta : ${peserta} orang
Total   : Rp ${total}

Mohon info ketersediaan jadwal ya kak.
Terima kasih`;

// simpan ke database dulu
fetch("save_booking.php", {
  method: "POST",
  headers: {
    "Content-Type": "application/x-www-form-urlencoded"
  },
  body:
    "nama=" + encodeURIComponent(nama) +
    "&paket=" + encodeURIComponent(title) +
    "&tanggal=" + encodeURIComponent(tanggal) +
    "&peserta=" + encodeURIComponent(peserta)
})
.then(() => {

  // setelah tersimpan baru buka WhatsApp
  window.open(`https://wa.me/${wa}?text=${encodeURIComponent(pesan)}`, "_blank");
  });

});
</script>

</body>
</html>
